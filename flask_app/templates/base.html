<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>{% block title %}WHO Dashboard{% endblock %} – Infectious Diseases</title>
<meta name="description" content="{% block meta_desc %}WHO Infectious Disease Dashboard – vaccination and infection data for global health stakeholders.{% endblock %}"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
{% block extra_head %}{% endblock %}
</head>
<body class="base-layout">

  <!-- ── Sidebar ── -->
  <aside class="base-sidebar">
    <div class="base-sidebar-header">
      <div class="base-logo-container">
        <div class="base-logo-icon-bg">
          <svg class="base-logo-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
          </svg>
        </div>
        <div>
          <p class="base-logo-title">WHO Dashboard</p>
          <p class="base-logo-subtitle">Infectious Diseases</p>
        </div>
      </div>
    </div>

    <nav class="base-nav">
      <a href="{{ url_for('mission.index') }}"
         class="base-nav-link {% if active_page == 'mission' %}base-nav-link-active{% else %}base-nav-link-inactive{% endif %}">
        <svg class="base-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Mission Statement
      </a>

      <a href="{{ url_for('economic.level2') }}"
         class="base-nav-link {% if active_page == 'level2' %}base-nav-link-active{% else %}base-nav-link-inactive{% endif %}">
        <svg class="base-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zM3 10a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zM14 9a1 1 0 00-1 1v6a1 1 0 001 1h6a1 1 0 001-1v-6a1 1 0 00-1-1h-6z"/>
        </svg>
        Economic Perspective
      </a>

      <a href="{{ url_for('above_average.level3') }}"
         class="base-nav-link {% if active_page == 'level3' %}base-nav-link-active{% else %}base-nav-link-inactive{% endif %}">
        <svg class="base-nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
        </svg>
        Above Average Analysis
      </a>
    </nav>

    <div class="base-sidebar-footer">
      <p class="base-sidebar-footer-text">Data Source: WHO 2024</p>
    </div>
  </aside>

  <!-- ── Main Content ── -->
  <main class="base-main">
    {% block content %}{% endblock %}
  </main>

{% block extra_scripts %}{% endblock %}
</body>
</html>
